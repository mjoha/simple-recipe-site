<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recipes</title>
    <link rel="stylesheet" href="/styles/site.css">
</head>
<body>
    <main>
        <h1>Recipes</h1>
        <input id="search-input" type="search" placeholder="Search recipes..." autocomplete="off">
        <p id="status" aria-live="polite"></p>
        <nav id="letter-index" aria-label="Recipe index letters"></nav>
        <section id="recipe-list-view">
            <p id="empty-state" hidden>No recipes match your search.</p>
            <div id="recipe-groups"></div>
        </section>
    </main>
    <script type="module" src="/scripts/app.js"></script>
</body>
</html>
