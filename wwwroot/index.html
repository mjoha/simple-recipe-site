<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recipes</title>
    <link rel="stylesheet" href="/styles/site.css">
</head>
<body>
    <main>
        <h1>Recipes</h1>
        <input id="search-input" type="search" placeholder="Search recipes..." autocomplete="off">
        <p id="status" aria-live="polite"></p>
        <section id="recipe-list-view">
            <p id="empty-state" hidden>No recipes match your search.</p>
            <div id="recipe-groups"></div>
        </section>
        <section id="recipe-detail-view" hidden>
            <button id="back-button" type="button" class="back-link">
                <span aria-hidden="true">←</span>
                <span>Back</span>
            </button>
            <article id="recipe-detail"></article>
        </section>
    </main>
    <script src="/scripts/app.js"></script>
</body>
</html>
